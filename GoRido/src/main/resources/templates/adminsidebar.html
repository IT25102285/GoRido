<!doctype html>
<html lang="en" class="dark" xmlns:th="http://www.thymeleaf.org">

<body>

<div th:fragment="adminSidebar">

    <aside
            class="hidden lg:flex w-72 bg-white dark:bg-zinc-900 border-r border-zinc-200 dark:border-zinc-800 flex-col fixed h-full">

        <!-- Logo -->
        <div class="px-8 py-6 border-b border-zinc-200 dark:border-zinc-800">

            <h1 class="text-3xl font-extrabold text-zinc-800 dark:text-white">

                Go<span class="text-yellow-400">Rido</span>

            </h1>

            <p class="text-xs text-zinc-500 mt-1">
                Admin Dashboard
            </p>

        </div>

        <!-- Navigation -->
        <nav class="px-6 py-6 space-y-2">

            <!-- Dashboard -->
            <a href="/adminDashboard"
               th:class="${activePage == 'adminDashboard'}
   ? 'nav-link flex items-center gap-3 px-4 py-3 rounded-xl bg-yellow-400 text-zinc-950 font-semibold'
   : 'nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-zinc-600 dark:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800'">

                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M3 12l2-2m0 0l7-7 7 7m-9 11V9m0 0H5a2 2 0 00-2 2v8a2 2 0 002 2h4m6-12h4a2 2 0 012 2v8a2 2 0 01-2 2h-4"/>
                </svg>

                Dashboard

            </a>

            <!-- Users -->
            <a th:if="${admin != null and admin.adminStatus.id == 1}"
               href="/manageAdmin"
               th:class="${activePage == 'manageAdmin'}
   ? 'nav-link flex items-center gap-3 px-4 py-3 rounded-xl bg-yellow-400 text-zinc-950 font-semibold'
   : 'nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-zinc-600 dark:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800'">

                <svg class="w-5 h-5"
                     fill="none"
                     stroke="currentColor"
                     viewBox="0 0 24 24">
                    <path stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M17 20h5V4H2v16h5m10 0v-2a4 4 0 00-8 0v2m8 0H9m4-10a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>

                Manage Admins

            </a>

            <a href="/manageUsers"
               th:class="${activePage == 'manageUsers'}
   ? 'nav-link flex items-center gap-3 px-4 py-3 rounded-xl bg-yellow-400 text-zinc-950 font-semibold'
   : 'nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-zinc-600 dark:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800'">

                <svg class="w-5 h-5"
                     fill="none"
                     stroke="currentColor"
                     viewBox="0 0 24 24">

                    <path stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M12 12a4 4 0 100-8 4 4 0 000 8zm0 2c-4.418 0-8 2-8 4v2h16v-2c0-2-3.582-4-8-4z"/>

                </svg>

                Users

            </a>

            <!-- Drivers -->
            <a href="/manageDrivers"
               th:class="${activePage == 'manageDrivers'}
   ? 'nav-link flex items-center gap-3 px-4 py-3 rounded-xl bg-yellow-400 text-zinc-950 font-semibold'
   : 'nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-zinc-600 dark:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800'">

                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M9 17V5a2 2 0 012-2h2a2 2 0 012 2v12m-6 0h6m-6 0H5m10 0h4"/>
                </svg>

                Drivers

            </a>

            <!-- Vehicles -->
            <a href="/manageVehiclesAdmin"
               th:class="${activePage == 'manageVehiclesAdmin'}
   ? 'nav-link flex items-center gap-3 px-4 py-3 rounded-xl bg-yellow-400 text-zinc-950 font-semibold'
   : 'nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-zinc-600 dark:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800'">

                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M9 17h6m-7 0l-1-5h10l-1 5m-8 0a1 1 0 11-2 0 1 1 0 012 0zm10 0a1 1 0 11-2 0 1 1 0 012 0zM5 12l1.5-4.5A2 2 0 018.4 6h7.2a2 2 0 011.9 1.5L19 12"/>
                </svg>

                Vehicles

            </a>

            <!-- Bookings -->
            <a href="/manageBookings"
               th:class="${activePage == 'manageBookings'}
   ? 'nav-link flex items-center gap-3 px-4 py-3 rounded-xl bg-yellow-400 text-zinc-950 font-semibold'
   : 'nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-zinc-600 dark:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800'">

                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>

                Bookings

            </a>

        </nav>

        <!-- Logout -->
        <div class="mt-auto p-4">

            <a onclick="adminLogout()"
               href="#"
               class="flex items-center justify-center gap-2 w-full py-3 rounded-xl
                      bg-red-50 dark:bg-red-900/20
                      text-red-500 font-semibold">

                Logout

            </a>

        </div>

    </aside>

</div>
</body>
</html>
