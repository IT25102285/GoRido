<!doctype html>
<html lang="en" class="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | GoRido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: "class" };</script>
    <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap"
            rel="stylesheet" />
    <style>
        h1, h2, h3, h4, .brand { font-family: "Outfit", sans-serif; }

        .glass {
          background: rgba(15, 23, 42, 0.72);
          backdrop-filter: blur(18px);
        }

        .tab-btn {
          position: relative;
          transition: color 0.2s;
        }
        .tab-btn.active {
          color: #facc15;
        }
        .tab-btn.active::after {
          content: '';
          position: absolute;
          bottom: -1px;
          left: 0; right: 0;
          height: 2px;
          background: #facc15;
          border-radius: 2px 2px 0 0;
        }

        .status-badge {
          display: inline-flex;
          align-items: center;
          gap: 6px;
          font-size: 11px;
          font-weight: 600;
          padding: 3px 10px;
          border-radius: 999px;
          letter-spacing: 0.03em;
          text-transform: uppercase;
        }

        .booking-row {
          transition: background 0.15s;
        }
        .booking-row:hover {
          background: rgba(250, 204, 21, 0.04);
        }

        .map-pin {
          width: 8px; height: 8px;
          border-radius: 50%;
          flex-shrink: 0;
          margin-top: 5px;
        }

        .route-line {
          width: 1px;
          height: 22px;
          margin: 2px auto;
          background: repeating-linear-gradient(to bottom, #94a3b8 0px, #94a3b8 4px, transparent 4px, transparent 8px);
        }

        .stat-card {
          border-radius: 1.25rem;
          padding: 1.25rem 1.5rem;
        }

        .receipt-strip {
          background: repeating-linear-gradient(
            90deg,
            transparent 0px, transparent 8px,
            rgba(148,163,184,0.15) 8px, rgba(148,163,184,0.15) 9px
          );
        }

        .avatar-ring {
          box-shadow: 0 0 0 2px #facc15;
        }

        @media (max-width: 640px) {
          .hide-sm { display: none !important; }
        }
    </style>
</head>

<body
        class="min-h-screen bg-zinc-100 dark:bg-zinc-950 text-zinc-800 dark:text-white">
<div class="min-h-screen flex">

    <div th:replace="~{adminSidebar :: adminSidebar}"></div>

    <!-- Main Area -->
    <main class="flex-1 lg:ml-72">

        <!-- Top Bar -->
        <header
                class="sticky top-0 z-40 bg-white/80 dark:bg-zinc-950/80 backdrop-blur border-b border-zinc-200 dark:border-zinc-800">

            <div
                    class="px-5 sm:px-8 py-4 flex items-center justify-between gap-4">

                <!-- Left -->
                <div class="flex items-center gap-4">

                    <!-- Title -->
                    <div>
                        <h2
                                class="text-xl sm:text-2xl font-bold text-zinc-800 dark:text-white">
                            Admin Dashboard
                        </h2>

                        <p class="text-sm text-zinc-500 dark:text-zinc-400">
                            Manage rides, drivers & bookings efficiently
                        </p>
                    </div>

                </div>

                <!-- Right -->
                <div class="flex items-center gap-3">

                    <!-- Admin Badge -->
                    <div class="sm:flex items-center gap-2 px-3 py-1.5 rounded-full
                        bg-yellow-400/10 border border-yellow-400/30">

                <span class="text-xs font-semibold text-yellow-500">
                  Administrator
                </span>

                    </div>

                </div>

            </div>

        </header>

        <section class="p-5 sm:p-8 space-y-6">

            <!-- Breadcrumb -->
            <nav
                    class="text-xs text-zinc-400 dark:text-zinc-500 flex items-center flex-wrap">
                <a href="/index" class="hover:text-yellow-400 transition">Admin
                    Dashboard</a>
            </nav>

            <!-- STAT CARDS -->
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">

                <div
                        class="stat-card bg-zinc-900 border border-zinc-800 rounded-2xl p-5">
                    <div
                            class="w-10 h-10 rounded-xl bg-yellow-400/10 flex items-center justify-center mb-4">
                        <svg class="w-5 h-5 text-yellow-400" fill="none"
                             stroke="currentColor" viewBox="0 0 24 24"><path
                                stroke-linecap="round" stroke-linejoin="round"
                                stroke-width="2"
                                d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                    </div>
                    <p class="text-xs text-zinc-500 uppercase tracking-wide">Total
                        Users</p>
                    <p class="brand text-2xl sm:text-3xl font-bold text-white mt-1"
                       th:text="${#lists.size(users)}">
                    </p>
                </div>

                <div
                        class="stat-card bg-zinc-900 border border-zinc-800 rounded-2xl p-5">
                    <div
                            class="w-10 h-10 rounded-xl bg-blue-400/10 flex items-center justify-center mb-4">
                        <svg class="w-5 h-5 text-blue-400" fill="none"
                             stroke="currentColor" viewBox="0 0 24 24"><path
                                stroke-linecap="round" stroke-linejoin="round"
                                stroke-width="2"
                                d="M3 7h18M3 7l2-3h14l2 3M3 7v10a2 2 0 002 2h14a2 2 0 002-2V7M9 17v-4m6 4v-4" /></svg>
                    </div>
                    <p class="text-xs text-zinc-500 uppercase tracking-wide">Active
                        Vehicles</p>
                    <p class="brand text-2xl sm:text-3xl font-bold text-white mt-1"
                       th:text="${#lists.size(vehicles)}">
                    </p>
                </div>

                <div
                        class="stat-card bg-zinc-900 border border-zinc-800 rounded-2xl p-5">
                    <div
                            class="w-10 h-10 rounded-xl bg-emerald-400/10 flex items-center justify-center mb-4">
                        <svg class="w-5 h-5 text-emerald-400" fill="none"
                             stroke="currentColor" viewBox="0 0 24 24"><path
                                stroke-linecap="round" stroke-linejoin="round"
                                stroke-width="2"
                                d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" /></svg>
                    </div>
                    <p class="text-xs text-zinc-500 uppercase tracking-wide">Rides
                        Today</p>
                    <p class="brand text-2xl sm:text-3xl font-bold text-white mt-1"
                       th:text="${todayRides}">
                    </p>
                </div>

                <div
                        class="stat-card bg-zinc-900 border border-zinc-800 rounded-2xl p-5">
                    <div
                            class="w-10 h-10 rounded-xl bg-orange-400/10 flex items-center justify-center mb-4">
                        <svg class="w-5 h-5 text-orange-400" fill="none"
                             stroke="currentColor" viewBox="0 0 24 24"><path
                                stroke-linecap="round" stroke-linejoin="round"
                                stroke-width="2"
                                d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                    </div>
                    <p class="text-xs text-zinc-500 uppercase tracking-wide">Revenue
                        (LKR)</p>
                    <p class="brand text-2xl sm:text-3xl font-bold text-white mt-1"
                       th:text="${#numbers.formatInteger(#aggregates.sum(totHires.![total_fare]) / 1000, 0) + 'K'}">
                    </p>
                </div>
            </div>

            <!-- MIDDLE ROW -->
            <div class="grid grid-cols-1 xl:grid-cols-1">

                <!-- Recent Rides -->
                <div
                        class="xl:col-span-2 bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden">
                    <div
                            class="px-6 py-4 border-b border-zinc-800 flex items-center justify-between">
                        <h3 class="font-bold text-white">Recent Rides</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead>
                            <tr
                                    class="text-[11px] uppercase tracking-wider text-zinc-500 border-b border-zinc-800">
                                <th class="text-left px-6 py-3 font-medium">Rider</th>
                                <th
                                        class="text-left px-6 py-3 font-medium hidden sm:table-cell">Driver</th>
                                <th
                                        class="text-left px-6 py-3 font-medium hidden md:table-cell">Route</th>
                                <th class="text-left px-6 py-3 font-medium">Status</th>
                                <th
                                        class="text-left px-6 py-3 font-medium hidden lg:table-cell">Fare</th>
                            </tr>
                            </thead>
                            <tbody class="divide-y divide-zinc-800">
                            <tr th:each="hire : ${hires}"
                                class="hover:bg-zinc-800/40 transition">

                                <td class="px-6 py-3">
                                    <div class="flex items-center gap-2.5">
                                        <span class="text-white font-medium"
                                              th:text="${hire.user.first_name} + ' ' + ${hire.user.last_name}">
            </span>
                                    </div>
                                </td>

                                <td class="px-6 py-3 text-zinc-400 hidden sm:table-cell"
                                    th:text="${hire.driver != null and hire.driver.userId != null} ? ${hire.driver.userId.first_name} : 'N/A'">
                                </td>

                                <td class="px-6 py-3 text-zinc-400 hidden md:table-cell text-xs"
                                    th:text="${hire.pickup_location + ' → ' + hire.drop_location}">
                                </td>

                                <td class="px-6 py-3">
    <span class="text-xs font-semibold px-2.5 py-1 rounded-full"
          th:text="${hire.hireStatus.id == 1} ? 'Pending' :
         (${hire.hireStatus.id == 2} ? 'Confirmed' :
         (${hire.hireStatus.id == 3} ? 'Cancelled' :
         (${hire.hireStatus.id == 4} ? 'Completed' : 'Unknown')))"

          th:classappend="${hire.hireStatus.id == 1} ? ' bg-yellow-400/10 text-yellow-400' :
                           (${hire.hireStatus.id == 2} ? ' bg-emerald-400/10 text-emerald-400' :
                           (${hire.hireStatus.id == 3} ? ' bg-red-400/10 text-red-400' :
                           ' bg-zinc-400/10 text-zinc-400'))">
    </span>
                                </td>

                                <td class="px-6 py-3 text-zinc-300 hidden lg:table-cell"
                                    th:text="'Rs. ' + ${hire.total_fare}">
                                </td>

                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>

        </section>
    </main>
</div>

<script>
    function toggleDetail(id) {
      const el = document.getElementById(id);
      el.classList.toggle('hidden');
    }

    function setTab(btn, tab) {
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.remove('active');
        b.classList.add('text-zinc-500', 'dark:text-zinc-400');
      });
      btn.classList.add('active');
      btn.classList.remove('text-zinc-500', 'dark:text-zinc-400');
    }
</script>

<script src="/Js/default.js"></script>
</body>
</html>
