<!doctype html>

<html lang="en" class="dark" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Manage Drivers | GoRido</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>

        tailwind.config = { darkMode: "class" };

    </script>

    <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap"
            rel="stylesheet" />

    <style>
        h1,

        h2,

        h3,

        h4,

        .brand {

          font-family: "Outfit", sans-serif;

        }



        .glass {

          background: rgba(15, 23, 42, 0.72);

          backdrop-filter: blur(18px);

        }



        .card-hover {

          transition: 0.25s ease;

        }



        .card-hover:hover {

          transform: tranzincY(-4px);

        }

    </style>

</head>

<body
        class="min-h-screen bg-zinc-100 dark:bg-zinc-950 text-zinc-800 dark:text-white">

<div class="min-h-screen flex">

    <!-- Sidebar -->

    <div th:replace="~{adminSidebar :: adminSidebar}"></div>

    <!-- Main Area -->

    <main class="flex-1 lg:ml-72">

        <!-- Top Bar -->

        <header
                class="sticky top-0 z-40 bg-white/80 dark:bg-zinc-950/80 backdrop-blur border-b border-zinc-200 dark:border-zinc-800">

            <div
                    class="px-5 sm:px-8 py-4 flex items-center justify-between">

                <div>

                    <h2 class="text-xl sm:text-2xl font-bold">Manage Drivers</h2>

                    <p
                            class="text-sm text-zinc-500 dark:text-zinc-400">
                        Manage drivers in GoRido
                    </p>

                </div>

            </div>

        </header>

        <section class="p-5 sm:p-8 space-y-8">

            <div
                    class="flex items-center justify-between w-full flex-wrap gap-4">

                <!-- Breadcrumbs (LEFT) -->
                <nav
                        class="text-xs text-zinc-400 dark:text-zinc-500 flex items-center flex-wrap">
                    <a href="/userprofile"
                       class="hover:text-yellow-400 transition">
                        Home
                    </a>

                    <span class="mx-2">/</span>

                    <span
                            class="text-zinc-300 dark:text-zinc-200 font-medium">
                                Manage Drivers
                            </span>
                </nav>

            </div>

            <!-- Recent Rides -->

            <div
                    class="bg-white dark:bg-zinc-900 rounded-3xl p-6 shadow-lg border border-zinc-200 dark:border-zinc-950 space-y-6">

                <div class="space-y-4">

                    <!-- DRIVER CARD -->
                    <div th:each="driver : ${drivers}"
                         class="bg-zinc-950 border border-zinc-800 rounded-2xl p-5 hover:border-cyan-400/30 transition duration-300">

                        <div class="flex flex-col xl:flex-row xl:items-center xl:justify-between gap-6">

                            <!-- LEFT -->
                            <div class="flex items-center gap-4 min-w-0">

                                <!-- Avatar -->
                                <div
                                        class="w-14 h-14 rounded-2xl bg-cyan-400/10 flex items-center justify-center text-cyan-400 font-bold text-lg flex-shrink-0">

                <span th:text="${#strings.substring(driver.userId.first_name,0,1) + #strings.substring(driver.userId.last_name,0,1)}">
                    DR
                </span>

                                </div>

                                <!-- Info -->
                                <div class="min-w-0">

                                    <div class="flex flex-wrap items-center gap-2">

                                        <!-- Name -->
                                        <h3 class="text-white font-semibold text-lg truncate"
                                            th:text="${driver.userId.first_name + ' ' + driver.userId.last_name}">
                                        </h3>

                                        <!-- Badge -->
                                        <span
                                                class="text-[11px] font-semibold px-2.5 py-1 rounded-full
                               bg-cyan-400/10 text-cyan-400 border border-cyan-400/20">
                        Driver
                    </span>

                                    </div>

                                    <!-- Email -->
                                    <p class="text-sm text-zinc-500 mt-1 truncate"
                                       th:text="${driver.userId.email}">
                                    </p>

                                    <!-- Details -->
                                    <div class="flex flex-wrap items-center gap-5 mt-4">

                                        <!-- NIC -->
                                        <div class="flex items-center gap-2 text-sm text-zinc-400">

                                            <svg class="w-4 h-4 text-zinc-500"
                                                 fill="none"
                                                 stroke="currentColor"
                                                 viewBox="0 0 24 24">
                                                <path stroke-linecap="round"
                                                      stroke-linejoin="round"
                                                      stroke-width="2"
                                                      d="M9 12h6m-6 4h6M7 4h10a2 2 0 012 2v12a2 2 0 01-2 2H7a2 2 0 01-2-2V6a2 2 0 012-2z"/>
                                            </svg>

                                            <span th:text="${driver.nic_number}">
                            200012345678
                        </span>

                                        </div>

                                        <!-- Mobile -->
                                        <div class="flex items-center gap-2 text-sm text-zinc-400">

                                            <svg class="w-4 h-4 text-zinc-500"
                                                 fill="none"
                                                 stroke="currentColor"
                                                 viewBox="0 0 24 24">
                                                <path stroke-linecap="round"
                                                      stroke-linejoin="round"
                                                      stroke-width="2"
                                                      d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.128a11.042 11.042 0 005.516 5.516l1.128-2.257a1 1 0 011.21-.502l4.493 1.498A1 1 0 0121 15.72V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                                            </svg>

                                            <span th:text="${driver.userId.mobile_number}">
                            0771234567
                        </span>

                                        </div>

                                        <!-- Status -->
                                        <div class="flex items-center gap-2 text-sm"
                                             th:classappend="${driver.statusId.id == 1} ? 'text-emerald-400' : 'text-red-400'">

                        <span class="w-2 h-2 rounded-full"
                              th:classappend="${driver.statusId.id == 1} ? 'bg-emerald-400' : 'bg-red-400'">
                        </span>

                                            <span th:text="${driver.statusId.id == 1} ? 'Active' : 'Deactive'">
                        </span>

                                        </div>

                                    </div>

                                </div>

                            </div>

                            <!-- RIGHT BUTTONS -->
                            <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full xl:w-auto">

                                <!-- Deactivate -->
                                <button th:if="${driver.statusId.id == 1}"
                                        th:attr="data-email=${driver.userId.email}"
                                        onclick="changeDriverStatus(this)"
                                        class="flex items-center gap-2 px-5 py-2.5 rounded-xl
                           bg-red-600 text-white text-sm font-semibold
                           shadow-lg shadow-red-400/10">

                                    Deactivate

                                </button>

                                <!-- Activate -->
                                <button th:if="${driver.statusId.id == 2}"
                                        th:attr="data-email=${driver.userId.email}"
                                        onclick="changeDriverStatus(this)"
                                        class="flex items-center gap-2 px-5 py-2.5 rounded-xl
                           bg-emerald-600 text-zinc-900 text-sm font-semibold
                           shadow-lg shadow-emerald-400/10">

                                    Activate

                                </button>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </section>

    </main>

</div>
<script src="/Js/manageDrivers.js"></script>
<script src="/Js/default.js"></script>
</body>

</html>
