<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>

  <title>Admin Sign In</title>
</head>

<body class="relative flex items-center justify-center min-h-screen px-4 bg-zinc-200 dark:bg-zinc-950 overflow-hidden">

<!-- card -->
<div class="relative w-full max-w-md">

  <div class="p-10 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-xl shadow-2xl rounded-3xl border border-zinc-200 dark:border-zinc-800">

    <!-- logo -->
    <div class="text-center mb-8">

      <h1 class="text-3xl font-extrabold mt-4 text-zinc-800 dark:text-white">
        Admin Portal
      </h1>

      <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-1">
        Secure access dashboard login
      </p>
    </div>

    <!-- form -->
    <form onsubmit="adminSignin(event)" class="space-y-5">

      <!-- email -->
      <div>
        <label class="block mb-1 text-sm text-zinc-600 dark:text-zinc-300">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com"
               class="w-full px-4 py-3 border border-transparent rounded-lg bg-zinc-200 dark:bg-zinc-800 text-zinc-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-yellow-400">
      </div>

      <!-- password -->
      <div>
        <label class="block mb-1 text-sm text-zinc-600 dark:text-zinc-300">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter your password"
               class="w-full px-4 py-3 border border-transparent rounded-lg bg-zinc-200 dark:bg-zinc-800 text-zinc-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-yellow-400">
      </div>

      <!-- error msg -->
      <p id="msg" class="hidden text-sm text-red-500 text-center"></p>

      <!-- button -->
      <button type="submit"
              class="w-full py-3 rounded-xl font-bold
                     bg-yellow-400 hover:bg-yellow-300
                     text-black shadow-lg transition duration-200
                     active:scale-[0.98]">

        Sign In
      </button>

      <p class="mt-4 text-sm text-center text-zinc-500 dark:text-zinc-400">
        Back to user?
        <a href="/signin" class="text-yellow-500 hover:underline">Sign In</a>
      </p>

    </form>

  </div>
</div>

<script src="/Js/adminSignin.js"></script>
</body>
</html>
